services:
  swimtrack-ai:
    build:
      context: .
    image: swimtrack-ai:local
    restart: unless-stopped
    environment:
      SWIMTRACK_BACKEND: ${SWIMTRACK_BACKEND:-tensorrt}
      SWIMTRACK_AUTH_TOKEN: ${SWIMTRACK_AUTH_TOKEN:?Set SWIMTRACK_AUTH_TOKEN in .env}
      SWIMTRACK_MODEL_SOURCE_DIR: /model-source
      SWIMTRACK_MODEL_CACHE_DIR: /model-cache
      SWIMTRACK_ONNX_FILENAME: ${SWIMTRACK_ONNX_FILENAME:-rtdetrv2_s.onnx}
      SWIMTRACK_ENGINE_FILENAME: ${SWIMTRACK_ENGINE_FILENAME:-rtdetrv2_s_fp16.engine}
      SWIMTRACK_BYTETRACK_ROOT: /app/vendor/ByteTrack
      SWIMTRACK_DEVICE: cuda:0
      SWIMTRACK_INPUT_WIDTH: ${SWIMTRACK_INPUT_WIDTH:-640}
      SWIMTRACK_INPUT_HEIGHT: ${SWIMTRACK_INPUT_HEIGHT:-640}
      SWIMTRACK_DIAGNOSTIC_SCORE_FLOOR: ${SWIMTRACK_DIAGNOSTIC_SCORE_FLOOR:-0.05}
      SWIMTRACK_SCORE_THRESHOLD: ${SWIMTRACK_SCORE_THRESHOLD:-0.15}
      SWIMTRACK_PERSON_LABEL: ${SWIMTRACK_PERSON_LABEL:-0}
      SWIMTRACK_MAX_DETECTIONS: ${SWIMTRACK_MAX_DETECTIONS:-20}
      SWIMTRACK_MIN_BOX_AREA: ${SWIMTRACK_MIN_BOX_AREA:-250}
      SWIMTRACK_TRACK_THRESHOLD: ${SWIMTRACK_TRACK_THRESHOLD:-0.45}
      SWIMTRACK_TRACK_BUFFER: ${SWIMTRACK_TRACK_BUFFER:-60}
      SWIMTRACK_MATCH_THRESHOLD: ${SWIMTRACK_MATCH_THRESHOLD:-0.80}
      SWIMTRACK_MOT20: ${SWIMTRACK_MOT20:-false}
      SWIMTRACK_LANE_ROI_ENABLED: ${SWIMTRACK_LANE_ROI_ENABLED:-true}
      SWIMTRACK_WEAK_REACTIVATION_ENABLED: ${SWIMTRACK_WEAK_REACTIVATION_ENABLED:-true}
      SWIMTRACK_WEAK_REACTIVATION_SCORE_THRESHOLD: ${SWIMTRACK_WEAK_REACTIVATION_SCORE_THRESHOLD:-0.10}
      SWIMTRACK_WEAK_REACTIVATION_MIN_BOX_AREA: ${SWIMTRACK_WEAK_REACTIVATION_MIN_BOX_AREA:-64}
      SWIMTRACK_WEAK_REACTIVATION_MAX_GAP_SECONDS: ${SWIMTRACK_WEAK_REACTIVATION_MAX_GAP_SECONDS:-1.0}
      SWIMTRACK_WEAK_REACTIVATION_MAX_CENTER_DISTANCE: ${SWIMTRACK_WEAK_REACTIVATION_MAX_CENTER_DISTANCE:-0.10}
      SWIMTRACK_FAR_CROP_ENABLED: ${SWIMTRACK_FAR_CROP_ENABLED:-false}
      SWIMTRACK_FAR_CROP_LEFT: ${SWIMTRACK_FAR_CROP_LEFT:-0.2962962963}
      SWIMTRACK_FAR_CROP_TOP: ${SWIMTRACK_FAR_CROP_TOP:-0.1111111111}
      SWIMTRACK_FAR_CROP_RIGHT: ${SWIMTRACK_FAR_CROP_RIGHT:-0.7037037037}
      SWIMTRACK_FAR_CROP_BOTTOM: ${SWIMTRACK_FAR_CROP_BOTTOM:-0.5185185185}
      SWIMTRACK_FAR_CROP_NMS_THRESHOLD: ${SWIMTRACK_FAR_CROP_NMS_THRESHOLD:-0.50}
      SWIMTRACK_IDENTITY_CONFIRMATION_OBSERVATIONS: ${SWIMTRACK_IDENTITY_CONFIRMATION_OBSERVATIONS:-3}
      SWIMTRACK_IDENTITY_CONFIRMATION_SECONDS: ${SWIMTRACK_IDENTITY_CONFIRMATION_SECONDS:-0.20}
      SWIMTRACK_IDENTITY_CONFIRMATION_CONFIDENCE: ${SWIMTRACK_IDENTITY_CONFIRMATION_CONFIDENCE:-0.18}
      SWIMTRACK_IDENTITY_TENTATIVE_MAX_GAP_SECONDS: ${SWIMTRACK_IDENTITY_TENTATIVE_MAX_GAP_SECONDS:-0.75}
      SWIMTRACK_IDENTITY_MAX_REASSOCIATION_GAP_SECONDS: ${SWIMTRACK_IDENTITY_MAX_REASSOCIATION_GAP_SECONDS:-12.0}
      SWIMTRACK_IDENTITY_MAX_SPEED_PER_SECOND: ${SWIMTRACK_IDENTITY_MAX_SPEED_PER_SECOND:-0.07}
      SWIMTRACK_IDENTITY_POSITION_SLACK: ${SWIMTRACK_IDENTITY_POSITION_SLACK:-0.08}
      SWIMTRACK_IDENTITY_MAX_LANE_X_DELTA: ${SWIMTRACK_IDENTITY_MAX_LANE_X_DELTA:-0.22}
      SWIMTRACK_IDENTITY_DUPLICATE_IOU: ${SWIMTRACK_IDENTITY_DUPLICATE_IOU:-0.45}
      SWIMTRACK_IDENTITY_DUPLICATE_POSITION_DELTA: ${SWIMTRACK_IDENTITY_DUPLICATE_POSITION_DELTA:-0.08}
      SWIMTRACK_IDENTITY_DUPLICATE_LANE_X_DELTA: ${SWIMTRACK_IDENTITY_DUPLICATE_LANE_X_DELTA:-0.15}
      SWIMTRACK_IDENTITY_ADDITIONAL_CONFIRMATION_OBSERVATIONS: ${SWIMTRACK_IDENTITY_ADDITIONAL_CONFIRMATION_OBSERVATIONS:-8}
      SWIMTRACK_IDENTITY_ADDITIONAL_CONFIRMATION_SECONDS: ${SWIMTRACK_IDENTITY_ADDITIONAL_CONFIRMATION_SECONDS:-0.50}
      SWIMTRACK_IDENTITY_ADDITIONAL_CONFIRMATION_CONFIDENCE: ${SWIMTRACK_IDENTITY_ADDITIONAL_CONFIRMATION_CONFIDENCE:-0.30}
      SWIMTRACK_IDENTITY_ADDITIONAL_MIN_POSITION_SPAN: ${SWIMTRACK_IDENTITY_ADDITIONAL_MIN_POSITION_SPAN:-0.15}
      SWIMTRACK_IDENTITY_ADDITIONAL_COOCCURRENCE_MAX_GAP_SECONDS: ${SWIMTRACK_IDENTITY_ADDITIONAL_COOCCURRENCE_MAX_GAP_SECONDS:-0.25}
      SWIMTRACK_IDENTITY_MAX_PER_LANE: ${SWIMTRACK_IDENTITY_MAX_PER_LANE:-2}
      SWIMTRACK_MAX_BATCH_FRAMES: ${SWIMTRACK_MAX_BATCH_FRAMES:-8}
      SWIMTRACK_MAX_FRAME_BYTES: ${SWIMTRACK_MAX_FRAME_BYTES:-2000000}
      SWIMTRACK_MAX_BATCH_BYTES: ${SWIMTRACK_MAX_BATCH_BYTES:-12000000}
      SWIMTRACK_MAX_REQUEST_BYTES: ${SWIMTRACK_MAX_REQUEST_BYTES:-16000000}
      SWIMTRACK_MAX_DECODED_PIXELS: ${SWIMTRACK_MAX_DECODED_PIXELS:-4194304}
      SWIMTRACK_MAX_METADATA_BYTES: ${SWIMTRACK_MAX_METADATA_BYTES:-65536}
      SWIMTRACK_MAX_SESSIONS: ${SWIMTRACK_MAX_SESSIONS:-128}
      SWIMTRACK_SESSION_TTL_SECONDS: ${SWIMTRACK_SESSION_TTL_SECONDS:-900}
      SWIMTRACK_IDEMPOTENCY_CACHE_SIZE: ${SWIMTRACK_IDEMPOTENCY_CACHE_SIZE:-32}
      SWIMTRACK_CLEANUP_INTERVAL_SECONDS: ${SWIMTRACK_CLEANUP_INTERVAL_SECONDS:-30}
      SWIMTRACK_DECODE_WORKERS: ${SWIMTRACK_DECODE_WORKERS:-4}
      SWIMTRACK_PREPROCESS_WORKERS: ${SWIMTRACK_PREPROCESS_WORKERS:-4}
      SWIMTRACK_TRT_WORKSPACE_GB: ${SWIMTRACK_TRT_WORKSPACE_GB:-4}
      SWIMTRACK_TRT_FP16: ${SWIMTRACK_TRT_FP16:-true}
      SWIMTRACK_TRT_OPT_BATCH_SIZE: ${SWIMTRACK_TRT_OPT_BATCH_SIZE:-4}
      SWIMTRACK_TRT_MAX_BATCH_SIZE: ${SWIMTRACK_TRT_MAX_BATCH_SIZE:-8}
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${SWIMTRACK_BIND_HOST:-127.0.0.1}:${SWIMTRACK_AI_PORT:-8001}:8001"
    volumes:
      - type: bind
        source: ${SWIMTRACK_MODEL_HOST_DIR:-./artifacts/models}
        target: /model-source
        read_only: true
      - type: volume
        source: trt-cache
        target: /model-cache
      - type: bind
        source: ${SWIMTRACK_INPUT_VIDEOS_HOST_DIR:-../input_vids}
        target: /data/input
        read_only: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

volumes:
  trt-cache:
